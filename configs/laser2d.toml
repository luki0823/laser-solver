# ===========================
# 2D Laser/Plume Numerics Test
# ===========================

nx = 500
ny = 500

Lx = 3e-3
Ly = 3e-3

CFL   = 0.1
t_end = 5e-6
gamma = 1.66

# your driver uses: enable_dt_diagnostics (not dt_diagnostics)
enable_dt_diagnostics = false

# "WENO3", "FirstOrder", "WENO5", "MUSCL", "WENO5Z", "TENO5"
reconstruction = "WENO3"

out_folder   = "data/laser2d"
out_interval = 25

# IMPORTANT: must be TOP-LEVEL (not under [initial_condition])
laser_mode = "initial_plume"   # "initial_plume" (recommended) or "volumetric_source"

# Optional safety knobs used by the driver
rho_cfl_floor = 1e-4
dt_warn       = 1e-12

[bc]
left   = "Symmetry"
right  = "Outflow"
bottom = "Wall"
top    = "Outflow"

[initial_condition]
rho0 = 1.78
u0   = 0.0
v0   = 0.0
p0   = 1.0e5

# -------------------------------------------------------------------
# Paper-style handling: represent laser deposition as an initial plume
#   - Put it near the bottom-left corner
#   - "oval_crater" is the closest supported shape to an ellipse
# -------------------------------------------------------------------
[plume_ic]
shape   = "oval_crater"

# Place near corner. For 3e-3 domain, a few cells off the walls:
# dx = 3e-3 / 200 = 1.5e-5, so 2-4 cells ~ 3e-5 to 6e-5
x0      = 6.0e-5
y0      = 6.0e-5

# Semi-axes (adjust to match the paper’s spot size / crater footprint)
rx      = 2.5e-4
ry      = 1.0e-4

# Your driver expects these names:
p_plume   = 2.1e8      # Pa (high-pressure region)
rho_plume = 1.78       # kg/m^3 (match ambient for a clean pressure-driven expansion)

# -------------------------------------------------------------------
# Volumetric heating option: only used if laser_mode="volumetric_source"
# -------------------------------------------------------------------
[laser]
A  = 5e12
x0 = 1.5e-3
y0 = 1.5e-3
wx = 3.0e-4
wy = 3.0e-4
t0 = 5e-8
wt = 1e-9
